# Build GH-AITranslator plugin (.gha) for both Rhino 7 and Rhino 8.
#
# The .gha assembly is a renamed .NET DLL that Grasshopper loads from
# %APPDATA%\Grasshopper\Libraries\. We build two flavors from one source:
#   * net48      → Rhino 7
#   * net7.0-windows → Rhino 8
#
# GH SDKs ship as NuGet packages (RhinoCommon + Grasshopper) so we don't
# need a Rhino install on the runner — the Windows VM only needs the .NET
# SDK. We do enable Windows targeting so MSBuild treats it as a Windows
# build.
#
# Artifact packaging:
#   Each flavor gets its OWN zip — `gha-rhino7` and `gha-rhino8`. Inside
#   each zip is EVERY file the user must drop into Libraries:
#     * GH-AITranslator-rhino{N}.gha       (the renamed entry-point dll)
#     * GHAITranslator.Core.dll             (our Core assembly, side-car)
#     * Newtonsoft.Json.dll                 (NuGet dep — GH does NOT auto-
#                                            resolve it, must sit next to .gha)
#   User flow: download ONE zip → unzip → copy ALL files into Libraries.
#   No more "I only got the .gha, now what" confusion.

name: build-gha

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # only needed for tag-driven releases

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore + sanity-check Core and tests
        shell: pwsh
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
          DOTNET_CLI_TELEMETRY_OPTOUT: "1"
        run: |
          $ErrorActionPreference = "Stop"
          dotnet --info | Tee-Object -FilePath "${{ runner.temp }}\dotnet-info.txt" | Out-Host
          try {
            # Restore the three projects so the per-step restore actions below
            # can be removed (single restore is more reliable — split restores
            # with -p:TargetFramework don't actually scope the assets file and
            # can leave the project.assets.json out of sync with what the
            # subsequent build steps need).
            dotnet restore src/GHAITranslator/GHAITranslator.csproj          -p:EnableWindowsTargeting=true
            dotnet restore src/GHAITranslator.Core/GHAITranslator.Core.csproj
            dotnet restore tests/GHAITranslator.Tests/GHAITranslator.Tests.csproj

            # Sanity-check the test build BEFORE we go near Rhino — if Core
            # or the unit tests are broken, we want a fast fail with a clear
            # log instead of a 5-minute Rhino build that masks the real cause.
            dotnet build  src/GHAITranslator.Core/GHAITranslator.Core.csproj -c Release --no-restore
            dotnet test   tests/GHAITranslator.Tests/GHAITranslator.Tests.csproj -c Release --logger "console;verbosity=normal"
          } catch {
            Write-Host "::error::$_"
            exit 1
          }

      - name: Build Rhino 7 .gha (net48, Release)
        shell: pwsh
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
        run: |
          $ErrorActionPreference = "Stop"
          # Stage directory for THIS flavor. Build the entire payload here,
          # then zip and upload it as `gha-rhino7`. Using a separate dir
          # means the R7 and R8 payloads never collide if a future change
          # runs them in parallel stages.
          $stage = "dist/rhino7"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          dotnet build src/GHAITranslator/GHAITranslator.csproj `
            -c Release `
            -f net48 `
            -p:EnableWindowsTargeting=true
          $binR7 = "src/GHAITranslator/bin/Release/net48"
          if (-not (Test-Path "$binR7/GH-AITranslator.dll")) {
            Write-Host "::error::Build did not produce $binR7/GH-AITranslator.dll"
            Get-ChildItem $binR7 -ErrorAction SilentlyContinue | Format-Table Name
            exit 1
          }

          # Copy the entry-point DLL to its final .gha filename. GH's loader
          # looks at the .gha extension and reads GH_AssemblyInfo from it.
          Copy-Item -Path "$binR7/GH-AITranslator.dll" -Destination "$stage/GH-AITranslator-rhino7.gha" -Force
          # Side-car DLLs MUST keep their .dll extension — GH resolves them by
          # filename next to the .gha. Without these:
          #   - Core.dll missing → FileNotFoundException at first method call
          #   - Newtonsoft.Json.dll missing → FileNotFoundException in cctor →
          #     menu silently never registers (the bug we hit at #10).
          Copy-Item -Path "$binR7/GHAITranslator.Core.dll" -Destination $stage/ -Force
          $newtonsoft = Get-ChildItem `
            -Path "$env:USERPROFILE/.nuget/packages/newtonsoft.json/13.0.3/lib/net45" `
            -Filter "Newtonsoft.Json.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($newtonsoft) {
            Copy-Item -Path $newtonsoft.FullName -Destination $stage/ -Force
            Write-Host "Copied Newtonsoft.Json from $($newtonsoft.FullName)"
          } else {
            Write-Host "::error::Newtonsoft.Json.dll not found in NuGet cache — GHA WILL fail to load on user machines"
            exit 1
          }

          # Build the zip the user actually downloads.
          $zip = "dist/gha-rhino7.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Write-Host "Rhino 7 package contents:"
          Get-ChildItem $stage | Format-Table Name, Length

      - name: Build Rhino 8 .gha (net7.0-windows, Release)
        shell: pwsh
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
        run: |
          $ErrorActionPreference = "Stop"
          $stage = "dist/rhino8"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          dotnet build src/GHAITranslator/GHAITranslator.csproj `
            -c Release `
            -f net7.0-windows `
            -p:EnableWindowsTargeting=true
          $binR8 = "src/GHAITranslator/bin/Release/net7.0-windows"
          if (-not (Test-Path "$binR8/GH-AITranslator.dll")) {
            Write-Host "::error::Build did not produce $binR8/GH-AITranslator.dll"
            Get-ChildItem $binR8 -ErrorAction SilentlyContinue | Format-Table Name
            exit 1
          }

          Copy-Item -Path "$binR8/GH-AITranslator.dll" -Destination "$stage/GH-AITranslator-rhino8.gha" -Force
          Copy-Item -Path "$binR8/GHAITranslator.Core.dll" -Destination $stage/ -Force
          $newtonsoft = Get-ChildItem `
            -Path "$env:USERPROFILE/.nuget/packages/newtonsoft.json/13.0.3/lib/net45" `
            -Filter "Newtonsoft.Json.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($newtonsoft) {
            Copy-Item -Path $newtonsoft.FullName -Destination $stage/ -Force
            Write-Host "Copied Newtonsoft.Json from $($newtonsoft.FullName)"
          } else {
            Write-Host "::error::Newtonsoft.Json.dll not found in NuGet cache — GHA WILL fail to load on user machines"
            exit 1
          }

          $zip = "dist/gha-rhino8.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Write-Host "Rhino 8 package contents:"
          Get-ChildItem $stage | Format-Table Name, Length

      - name: Upload Rhino 7 package
        uses: actions/upload-artifact@v4
        with:
          name: gha-rhino7
          path: dist/gha-rhino7.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Rhino 8 package
        uses: actions/upload-artifact@v4
        with:
          name: gha-rhino8
          path: dist/gha-rhino8.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach .gha to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gha-rhino7.zip
            dist/gha-rhino8.zip
          generate_release_notes: true
