# Build GH-AITranslator plugin (.gha) for both Rhino 7 and Rhino 8.
#
# The .gha assembly is a renamed .NET DLL that Grasshopper loads from
# %APPDATA%\Grasshopper\Libraries\. We build two flavors from one source:
#   * net48      → Rhino 7  (.gha-loader-picks-on-extension)
#   * net7.0-windows → Rhino 8
#
# GH SDKs ship as NuGet packages (RhinoCommon + Grasshopper) so we don't
# need a Rhino install on the runner — the Windows VM only needs the .NET
# SDK. We do enable Windows targeting so MSBuild treats it as a Windows
# build.

name: build-gha

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # only needed for tag-driven releases

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore + sanity-check Core and tests
        shell: pwsh
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
          DOTNET_CLI_TELEMETRY_OPTOUT: "1"
        run: |
          $ErrorActionPreference = "Stop"
          dotnet --info | Tee-Object -FilePath "${{ runner.temp }}\dotnet-info.txt" | Out-Host
          try {
            # Restore the three projects so the per-step restore actions below
            # can be removed (single restore is more reliable — split restores
            # with -p:TargetFramework don't actually scope the assets file and
            # can leave the project.assets.json out of sync with what the
            # subsequent build steps need).
            dotnet restore src/GHAITranslator/GHAITranslator.csproj          -p:EnableWindowsTargeting=true
            dotnet restore src/GHAITranslator.Core/GHAITranslator.Core.csproj
            dotnet restore tests/GHAITranslator.Tests/GHAITranslator.Tests.csproj

            # Sanity-check the test build BEFORE we go near Rhino — if Core
            # or the unit tests are broken, we want a fast fail with a clear
            # log instead of a 5-minute Rhino build that masks the real cause.
            dotnet build  src/GHAITranslator.Core/GHAITranslator.Core.csproj -c Release --no-restore
            dotnet test   tests/GHAITranslator.Tests/GHAITranslator.Tests.csproj -c Release --logger "console;verbosity=normal"
          } catch {
            Write-Host "::error::$_"
            exit 1
          }

      - name: Build Rhino 7 .gha (net48, Release)
        shell: pwsh
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
        run: |
          $ErrorActionPreference = "Stop"
          # Create the artifacts dir up-front — Copy-Item doesn't create the
          # destination folder and on a fresh runner the directory doesn't exist.
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          # Drop --no-restore and let `dotnet build` do its own restore — on
          # Windows runners the assets file can be left in a state where
          # --no-restore sees it as stale even when our explicit restore
          # succeeded. Letting build trigger a fast NoRestore=false pass
          # is slower by ~2s but bulletproof.
          dotnet build src/GHAITranslator/GHAITranslator.csproj `
            -c Release `
            -f net48 `
            -p:EnableWindowsTargeting=true
          $binR7 = "src/GHAITranslator/bin/Release/net48"
          if (-not (Test-Path "$binR7/GH-AITranslator.dll")) {
            Write-Host "::error::Build did not produce $binR7/GH-AITranslator.dll"
            Get-ChildItem $binR7 -ErrorAction SilentlyContinue | Format-Table Name
            exit 1
          }
          # Copy straight to the final .gha filename — avoids the
          # Rename-Item "represents a path or device name" failure mode
          # we hit when the source DLL gets touched between steps.
          Copy-Item -Path "$binR7/GH-AITranslator.dll" -Destination artifacts/GH-AITranslator-rhino7.gha -Force
          Copy-Item -Path "$binR7/GHAITranslator.Core.dll" -Destination artifacts/ -Force
          $newtonsoft = Get-ChildItem `
            -Path "$env:USERPROFILE/.nuget/packages/newtonsoft.json/13.0.3/lib/net45" `
            -Filter "Newtonsoft.Json.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($newtonsoft) {
            Copy-Item -Path $newtonsoft.FullName -Destination artifacts/ -Force
            Write-Host "Copied Newtonsoft.Json from $($newtonsoft.FullName)"
          } else {
            Write-Host "::warning::Newtonsoft.Json.dll not found in NuGet cache — GHA will likely fail to load on the user machine"
          }
          Write-Host "Final artifacts:"
          Get-ChildItem artifacts | Format-Table Name, Length

      - name: Build Rhino 8 .gha (net7.0-windows, Release)
        shell: pwsh
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          dotnet build src/GHAITranslator/GHAITranslator.csproj `
            -c Release `
            -f net7.0-windows `
            -p:EnableWindowsTargeting=true
          $binR8 = "src/GHAITranslator/bin/Release/net7.0-windows"
          if (-not (Test-Path "$binR8/GH-AITranslator.dll")) {
            Write-Host "::error::Build did not produce $binR8/GH-AITranslator.dll"
            Get-ChildItem $binR8 -ErrorAction SilentlyContinue | Format-Table Name
            exit 1
          }
          # Copy the plugin's main DLL straight to the final .gha filename.
          # GH does not auto-resolve NuGet deps for a GHA — Newtonsoft.Json
          # must sit next to the .gha. Without it, the GHA throws
          # FileNotFoundException inside its static cctor, the cctor's
          # try/catch swallows it, and the menu silently never registers.
          Copy-Item -Path "$binR8/GH-AITranslator.dll" -Destination artifacts/GH-AITranslator-rhino8.gha -Force
          Copy-Item -Path "$binR8/GHAITranslator.Core.dll" -Destination artifacts/ -Force
          $newtonsoft = Get-ChildItem `
            -Path "$env:USERPROFILE/.nuget/packages/newtonsoft.json/13.0.3/lib/net45" `
            -Filter "Newtonsoft.Json.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($newtonsoft) {
            Copy-Item -Path $newtonsoft.FullName -Destination artifacts/ -Force
            Write-Host "Copied Newtonsoft.Json from $($newtonsoft.FullName)"
          } else {
            Write-Host "::warning::Newtonsoft.Json.dll not found in NuGet cache — GHA will likely fail to load on the user machine"
          }
          Write-Host "Final artifacts:"
          Get-ChildItem artifacts | Format-Table Name, Length

      - name: List artifacts
        shell: pwsh
        run: |
          Get-ChildItem artifacts -Recurse | Format-Table FullName, Length

      - name: Upload .gha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gha-build
          path: artifacts/*.gha
          if-no-files-found: error
          retention-days: 30

      - name: Attach .gha to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GH-AITranslator-rhino7.gha
            artifacts/GH-AITranslator-rhino8.gha
          generate_release_notes: true